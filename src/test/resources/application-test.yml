# 测试环境配置 - 使用 H2 内存数据库
server:
  port: 8000

spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false;INIT=RUNSCRIPT FROM 'classpath:schema.sql'
    username: sa
    password: 

  # H2 控制台
  h2:
    console:
      enabled: false

  sql:
    init:
      mode: never

  # 关闭 Redis
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# 关闭国产化配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.joyfishs: debug
    org.springframework: warn

# 禁用 Swagger
knife4j:
  production: true
