server:
  port: 8000
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8
    max-threads: 800
    min-spare-threads: 30
token:
  header: Authorization
  secret: ${TOKEN_SECRET}
  expireTime: 1800000
spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  main:
    allow-circular-references: true
  messages:
    basename: message/messages
  encoding:
    charset: UTF-8
    enabled: true
    force: true
  jackson:
    # 格式化设置
    date-format: "yyyy-MM-dd HH:mm:ss"
    # 时区
    time-zone: "GMT+8"
  profiles:
    active: @profiles.active@
  flyway:
    # 启用 Flyway 自动管理 schema (启动时执行 db/migration 下的 V*.sql)
    enabled: true
    # 第一次启动时如果库里有表但没有 flyway_schema_history, 自动 baseline 到当前版本
    baseline-on-migrate: true
    # baseline 时打这个版本号, 之后只跑 > 这个版本号的 migration
    baseline-version: 20260606
    # migration 文件位置 (默认值, 显式写清楚)
    locations: classpath:db/migration
    # 表名前缀
    table: flyway_schema_history
    # 关闭 validation, 允许 migration 文件后续被修改 (生产环境应该开 validate)
    validate-on-migrate: false
    # 文件上传
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB
  freemarker:
    enabled: true
    cache: false
    content-type: text/html
    charset: utf-8
    suffix: .ftl
    request-context-attribute: request
    expose-request-attributes: false
    expose-session-attributes: false
    allow-request-override: true
    allow-session-override: true
    expose-spring-macro-helpers: false
    check-template-location: true
    prefer-file-system-access: true
    template-loader-path:
      - classpath:/templates/
    settings:
      datetime_format: yyyy-MM-dd HH:mm:ss      # date 输出格式化
      template_update_delay: 30m                # 模板引擎刷新时间
      default_encoding: utf-8                   # 默认编码
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  #实体扫描，多个package用逗号或者分号分隔
  typeAliasesPackage: com.joyfishs.**.domain
  typeEnumsPackage: com.joyfishs.dawa.**
  global-config:
    #主键类型  0:"数据库ID自增", 1:"用户输入ID",2:"全局唯一ID (数字类型唯一ID)", 3:"全局唯一ID UUID";
    id-type: 0
    #字段策略 0:"忽略判断",1:"非 NULL 判断"),2:"非空判断"
    field-strategy: 2
    #驼峰下划线转换
    db-column-underline: false
    #刷新mapper 调试神器
    refresh-mapper: false
    #数据库大写下划线转换
    #capital-mode: true
    # Sequence序列接口实现类配置
    #key-generator: com.baomidou.mybatisplus.incrementer.OracleKeyGenerator
    #逻辑删除配置
    logic-delete-value: -1
    logic-not-delete-value: 0
    #自定义填充策略接口实现
    #meta-object-handler: com.baomidou.springboot.xxx
    #自定义SQL注入器
    #sql-injector: com.baomidou.mybatisplus.mapper.LogicSqlInjector
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true

pagehelper:
  helperDialect: mysql
  reasonable: true
  supportMethodsArguments: false
  params: count=countSql

knife4j:
  enable: true
  setting:
    language: zh-CN
    enableDocumentManage: true
    enableVersion: false
    enableReloadCacheParameter: false
    enableAfterScript: true
    enableFilterMultipartApiMethodType: POST
    enableFilterMultipartApis: false
    enableRequestCache: true
    enableSwaggerModels: false
    enableSearch: true
    enableFooter: false
    enableFooterCustom: true
    footerCustomContent: Copyright  2024 子非鱼（湖北）信息科技有限公司(https://www.joyfishs.com/)
  production: false
  basic:
    enable: ${KNIFE4J_BASIC_ENABLED:false}
    username: ${KNIFE4J_BASIC_USERNAME}
    password: ${KNIFE4J_BASIC_PASSWORD}
# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice/*
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

