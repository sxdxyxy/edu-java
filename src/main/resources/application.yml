# 智理安全闸机联动配置
# dev/prod 通过 application-{profile}.yml 覆盖 callback-url
safety:
  gate:
    callback-url: ${SAFETY_GATE_CALLBACK_URL:http://127.0.0.1:8000/access/gate/callback}
  # D6: 二维码存储策略. local=dev-sts 写本地文件 + Spring 静态目录; oss=prod 走腾讯云 COS
  # 详见 com.joyfishs.dawa.safety.qrcode.QrCodeStorage
  qr:
    storage: ${SAFETY_QR_STORAGE:local}
    local:
      base-path: ${SAFETY_QR_LOCAL_BASE_PATH:/tmp/qrcode}
      # dev-sts 容器内 8091 -> host 8091, nginx 需把 /qrcode/* 转到后端 (或 Spring 静态资源)
      url-prefix: ${SAFETY_QR_LOCAL_URL_PREFIX:http://127.0.0.1:8091/qrcode}
