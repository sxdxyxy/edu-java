oss:
  downloadPath: ${OSS_DOWNLOAD_PATH:/tmp/downloads}

tencent:
  appId: ${TENCENT_APP_ID}
  appSecret: ${TENCENT_APP_SECRET}
  secretId: ${TENCENT_SECRET_ID}
  secretKey: ${TENCENT_SECRET_KEY}
  # 获取 Access Token 地址
  getAccessTokenUrl: "https://miniprogram-kyc.tencentcloudapi.com/api/oauth2/access_token"
  # 获取 SIGN ticket 地址
  getSignTicketUrl: "https://miniprogram-kyc.tencentcloudapi.com/api/oauth2/api_ticket"
  # 人脸识别上送身份信息地址
  uploadFaceidUrl: "https://miniprogram-kyc.tencentcloudapi.com/api/server/getfaceid"
  # 人脸识别 licence
  licence: ${TENCENT_FACE_LICENCE}

